<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    width:99.5%;
    max-width:1900px;
    margin:15px auto 0;
    flex:1;
}

.logo{
    width:100%;
    max-width:860px;
    display:block;
    margin:0 auto 25px;
    transition: opacity 0.4s ease;
}

.logo:hover{
    opacity:0.7;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:220px;
    align-items:start;
}

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px;
}

.proyecto{
    position:relative;
    cursor:pointer;
    border-radius: 4px;
}

.proyecto img{
    width:104%;
    display:block;
    transition: all 0.5s ease;
    position:relative;
    z-index:1;
}

/* ============================================ */
/* ESCRITORIO - BRILLO AMARILLO SUAVE          */
/* ============================================ */

@media (min-width: 769px) {
    
    .proyecto:hover img{
        filter: brightness(1.25) saturate(1.4) sepia(0.5);
    }

    .proyecto:hover .titulo{
        color: #ffffff;
        letter-spacing: 2.5px;
    }
}

/* ============================================ */
/* MÓVIL - EFECTO TAP                          */
/* ============================================ */

@media (max-width: 768px) {
    
    .proyecto:active img{
        filter: brightness(1.25) saturate(1.4) sepia(0.5);
        transition: filter 0.15s ease;
    }

    .proyecto:active .titulo{
        color: #ffffff;
    }
}

/* ============================================ */
/* TÍTULOS                                     */
/* ============================================ */

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
    text-align: center;
    transition: all 0.4s ease;
    position:relative;
    z-index:2;
}

/* ============================================ */
/* FOOTER - CON MUCHO ESPACIO                  */
/* ============================================ */

.footer{
    width:99.5%;
    max-width:1900px;
    margin:150px auto 30px;
    text-align:center;
}

.footer-logos{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:30px;
}

.footer-logos img{
    display:block;
    opacity:0.8;
    transition: opacity 0.3s ease;
}

.footer-logos img:hover{
    opacity:1;
}

/* CONTACTO - ARRIBA */
.contacto-text{
    color:#F4DE65;
    font-size:10px;
    font-weight:300;
    letter-spacing:2.5px;
    text-transform:uppercase;
    transition: color 0.3s ease;
    margin-bottom:80px;
}

.contacto-text:hover{
    color:#ffffff;
}

/* LOGO INAEM - CENTRO */
.logo-inaem{
    height:55px;
    width:auto;
}

.footer-text{
    color:#F5E98D;
    font-size:10px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    display:inline-block;
    margin-top:15px;
}

/* ============================================ */
/* MÓVIL - RESPONSIVE                          */
/* ============================================ */

@media (max-width: 768px) {

    .container{
        width:92%;
        margin:10px auto 0;
    }

    .logo{
        max-width:100%;
        margin:0 auto 20px;
    }

    .proyectos{
        display:flex;
        flex-direction:column;
        gap:40px;
        align-items:center;
    }

    .columna-izquierda,
    .columna-derecha{
        display:flex;
        flex-direction:column;
        gap:40px;
        width:100%;
        max-width:100%;
        margin:0;
    }

    .columna-derecha{
        margin-top:0;
    }

    .proyecto{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    .proyecto img{
        width:90%;
        max-width:400px;
        display:block;
        filter: brightness(0.9) saturate(0.9);
    }

    .titulo{
        font-size:8px;
        letter-spacing:1.2px;
        margin-top:8px;
        text-align:center;
    }

    .footer{
        width:92%;
        margin:100px auto 20px;
    }

    .contacto-text{
        font-size:9px;
        letter-spacing:2px;
        margin-bottom:60px;
    }

    .logo-inaem{
        height:40px;
    }

    .footer-text{
        font-size:9px;
        letter-spacing:1.2px;
        margin-top:12px;
    }
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" style="display:block; text-decoration:none;">
    <img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">
</a>

<div class="proyectos">

<div class="columna-izquierda">

    <a href="sucre.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="sucré.jpg" alt="Sucré">
            <div class="titulo">SUCRÉ</div>
        </div>
    </a>

    <a href="rabbits.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="madriguera.png" alt="SAVE THE F***ING RABBITS">
            <div class="titulo">SAVE THE F***ING RABBITS</div>
        </div>
    </a>

</div>

<div class="columna-derecha">

    <a href="hours.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="hours.png" alt="The Hours">
            <div class="titulo">THE HOURS</div>
        </div>
    </a>

    <a href="pisapapeles.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="pisapapeles.jpg" alt="Pisapapeles">
            <div class="titulo">PISAPAPELES</div>
        </div>
    </a>

</div>

</div>

</div>

<!-- ============================================ -->
<!-- FOOTER                                      -->
<!-- ============================================ -->

<div class="footer">

    <div class="footer-logos">

        <!-- CONTACTO MUY ARRIBA -->
        <span class="contacto-text">CONTACTO</span>

        <!-- LOGO INAEM MUCHO MÁS ABAJO -->
        <img class="logo-inaem" src="logo-blanco-inaem-1200x212.png" alt="INAEM">

    </div>

    <span class="footer-text">SAVE THE F***ING RABBITS .prod © 2026</span>

</div>

</body>
</html>
