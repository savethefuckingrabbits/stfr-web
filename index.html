<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    overflow-x: hidden;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
}

.container{
    width:100%;
    max-width:1400px; /* ← Reducido para que no se vea tan disperso */
    margin:15px auto 40px;
    padding:0 15px;
}

.logo{
    width:100%;
    max-width:860px;
    display:block;
    margin:0 auto 25px;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr; /* ← Siempre dos columnas */
    column-gap:60px; /* ← Gap más razonable */
    align-items:start;
}

/* IZQUIERDA */

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

/* DERECHA */

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px; /* ← Mantengo el desfase que tienes en tu diseño */
}

.proyecto {
    position: relative;
    overflow: hidden;
}

.proyecto img{
    width:100%;
    display:block;
}

/* TÍTULOS */

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
    padding-left:10px; /* ← Pequeño padding para que no toque el borde */
}

/* --- RESPONSIVE: MÓVIL --- */
@media (max-width: 768px) {

    .container{
        padding:0;
        max-width:100%;
    }

    .logo{
        padding:0 10px;
        max-width:100%;
    }

    .proyectos{
        grid-template-columns:1fr 1fr; /* ← MANTENEMOS DOS COLUMNAS */
        column-gap:10px; /* ← Gap pequeño en móvil */
    }

    .columna-izquierda{
        gap:50px;
    }

    .columna-derecha{
        gap:50px;
        margin-top:80px; /* ← Reducido para móvil */
    }

    .proyecto img{
        width:100%;
        border-radius:0;
    }

    .columna-izquierda .titulo,
    .columna-derecha .titulo{
        padding-left:8px;
        padding-right:8px;
    }

    .titulo{
        font-size:9px; /* ← Más pequeño en móvil para que quepa */
        letter-spacing:1.2px;
        margin-top:8px;
    }
}

/* --- Para pantallas muy grandes (ajuste fino) --- */
@media (min-width: 1400px) {
    .proyectos{
        column-gap:100px; /* ← Más separación en pantallas enormes */
    }
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">

<div class="proyectos">

<div class="columna-izquierda">

<div class="proyecto">
<img src="sucré.jpg" alt="Sucré">
<div class="titulo">
SUCRÉ
</div>
</div>

<div class="proyecto">
<img src="madriguera.png" alt="SAVE THE F***ING RABBITS">
<div class="titulo">
SAVE THE F***ING RABBITS
</div>
</div>

</div>

<div class="columna-derecha">

<div class="proyecto">
<img src="hours.png" alt="The Hours">
<div class="titulo">
THE HOURS
</div>
</div>

<div class="proyecto">
<img src="pisapapeles.jpg" alt="Pisapapeles">
<div class="titulo">
PISAPAPELES
</div>
</div>

</div>

</div>

</div>

</body>
</html>
