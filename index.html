<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
}

.container{
    width:99.5%;
    max-width:1900px;
    margin:15px auto 40px;
}

.logo{
    width:100%;
    max-width:860px;
    display:block;
    margin:0 auto 25px;
    transition: opacity 0.4s ease;
}

.logo:hover{
    opacity:0.7;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:220px;
    align-items:start;
}

/* IZQUIERDA */

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

/* DERECHA */

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px;
}

.proyecto{
    position:relative;
    cursor:pointer;
}

.proyecto img{
    width:104%;
    display:block;
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    filter: brightness(0.8) saturate(0.9);
    border-radius: 4px;
}

/* EFECTO HOVER EN ESCRITORIO */
@media (min-width: 769px) {
    .proyecto:hover img{
        filter: brightness(1.1) saturate(1.1) drop-shadow(0 0 30px rgba(244, 222, 101, 0.3));
        transform: scale(1.02);
    }

    .proyecto:hover .titulo{
        color: #fff;
        letter-spacing: 2.5px;
    }

    .proyecto::after{
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(244, 222, 101, 0.05) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
        border-radius: 4px;
    }

    .proyecto:hover::after{
        opacity: 1;
    }
}

/* EFECTO TAP EN MÓVIL (sutil) */
@media (max-width: 768px) {
    .proyecto:active img{
        filter: brightness(1.2) saturate(1.1);
        transform: scale(0.98);
        transition: all 0.15s ease;
    }

    .proyecto:active .titulo{
        color: #fff;
    }
}

.proyecto img{
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* TÍTULOS */

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
    text-align: center;
    transition: all 0.4s ease;
}

/* ============================================ */
/* SOLO PARA MÓVIL - NO AFECTA A ESCRITORIO     */
/* ============================================ */

@media (max-width: 768px) {

    .container{
        width:92%;
        margin:10px auto 30px;
    }

    .logo{
        max-width:100%;
        margin:0 auto 20px;
    }

    .proyectos{
        display:flex;
        flex-direction:column;
        gap:40px;
        align-items:center;
    }

    .columna-izquierda,
    .columna-derecha{
        display:flex;
        flex-direction:column;
        gap:40px;
        width:100%;
        max-width:100%;
        margin:0;
    }

    .columna-derecha{
        margin-top:0;
    }

    .proyecto{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    .proyecto img{
        width:90%;
        max-width:400px;
        display:block;
        filter: brightness(0.9) saturate(0.9);
    }

    .titulo{
        font-size:8px;
        letter-spacing:1.2px;
        margin-top:8px;
        text-align:center;
    }

}

</style>

</head>

<body>

<div class="container">

<!-- Logo con enlace a la página principal (opcional) -->
<a href="index.html" style="display:block; text-decoration:none;">
    <img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">
</a>

<div class="proyectos">

<div class="columna-izquierda">

    <!-- PROYECTO 1: SUCRÉ -->
    <a href="sucre.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="sucré.jpg" alt="Sucré">
            <div class="titulo">SUCRÉ</div>
        </div>
    </a>

    <!-- PROYECTO 2: SAVE THE F***ING RABBITS -->
    <a href="rabbits.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="madriguera.png" alt="SAVE THE F***ING RABBITS">
            <div class="titulo">SAVE THE F***ING RABBITS</div>
        </div>
    </a>

</div>

<div class="columna-derecha">

    <!-- PROYECTO 3: THE HOURS -->
    <a href="hours.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="hours.png" alt="The Hours">
            <div class="titulo">THE HOURS</div>
        </div>
    </a>

    <!-- PROYECTO 4: PISAPAPELES -->
    <a href="pisapapeles.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="pisapapeles.jpg" alt="Pisapapeles">
            <div class="titulo">PISAPAPELES</div>
        </div>
    </a>

</div>

</div>

</div>

</body>
</html>
