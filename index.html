<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body {
    overflow-x: hidden; /* ← Evita el scroll horizontal */
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
}

.container{
    width:100%; /* ← Ahora ocupa todo el ancho */
    max-width:1900px;
    margin:15px auto 40px;
    padding:0 10px; /* ← Pequeño padding para que no toque el borde en móviles muy pequeños */
}

.logo{
    width:100%;
    max-width:860px;
    display:block;
    margin:0 auto 25px;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:220px;
    align-items:start;
}

/* IZQUIERDA */

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

/* DERECHA */

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px;
}

.proyecto {
    position: relative;
    overflow: hidden; /* ← Para que las imágenes no se salgan */
}

.proyecto img{
    width:100%; /* ← Antes era 104%, ahora 100% para que no desborde */
    display:block;
}

/* TÍTULOS */

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
}

/* Los dos bloques miran hacia el centro */
/* Ajustados para que los títulos queden alineados con el borde de las imágenes */

.columna-izquierda .titulo{
    margin-left:0; /* ← Lo quitamos porque ahora las imágenes llegan al borde */
}

.columna-derecha .titulo{
    margin-left:0; /* ← Lo quitamos porque ahora las imágenes llegan al borde */
}

/* --- RESPONSIVE: MÓVIL --- */
@media (max-width: 768px) {

    .container{
        padding:0; /* ← Sin padding en móvil para que las fotos toquen el borde */
        margin:10px auto 30px;
    }

    .logo{
        padding:0 10px; /* ← Solo el logo tiene un poco de margen */
        max-width:100%;
    }

    .proyectos{
        grid-template-columns:1fr; /* ← Una sola columna en móvil */
        column-gap:0;
    }

    .columna-izquierda{
        gap:60px;
    }

    .columna-derecha{
        gap:60px;
        margin-top:60px; /* ← Menos margen en móvil */
    }

    .proyecto img{
        width:100%; /* ← Ocupa todo el ancho, tocando los bordes */
        border-radius:0;
    }

    .columna-izquierda .titulo,
    .columna-derecha .titulo{
        margin-left:10px; /* ← Solo un pequeño margen para que no toque el borde */
        margin-right:10px;
    }

    .titulo{
        font-size:10px;
        letter-spacing:1.5px;
    }
}

/* --- Para pantallas muy grandes (opcional) --- */
@media (min-width: 1400px) {
    .proyectos{
        column-gap:280px; /* ← Más separación en pantallas enormes */
    }

    .columna-izquierda .titulo{
        margin-left:0;
    }

    .columna-derecha .titulo{
        margin-left:0;
    }
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">

<div class="proyectos">

<div class="columna-izquierda">

<div class="proyecto">
<img src="sucré.jpg" alt="Sucré">
<div class="titulo">
SUCRÉ
</div>
</div>

<div class="proyecto">
<img src="madriguera.png" alt="SAVE THE F***ING RABBITS">
<div class="titulo">
SAVE THE F***ING RABBITS
</div>
</div>

</div>

<div class="columna-derecha">

<div class="proyecto">
<img src="hours.png" alt="The Hours">
<div class="titulo">
THE HOURS
</div>
</div>

<div class="proyecto">
<img src="pisapapeles.jpg" alt="Pisapapeles">
<div class="titulo">
PISAPAPELES
</div>
</div>

</div>

</div>

</div>

</body>
</html>
