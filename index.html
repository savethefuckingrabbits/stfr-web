<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
}

.container{
    width:99.5%;
    max-width:1900px;
    margin:15px auto 40px;
}

.logo{
    width:100%;
    max-width:860px;
    display:block;
    margin:0 auto 25px;
    transition: opacity 0.4s ease;
}

.logo:hover{
    opacity:0.7;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:220px;
    align-items:start;
}

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px;
}

.proyecto{
    position:relative;
    cursor:pointer;
    border-radius: 4px;
    overflow:hidden;
}

.proyecto img{
    width:104%;
    display:block;
    transition: all 0.5s ease;
    position:relative;
    z-index:1;
}

/* ============================================ */
/* OVERLAY AMARILLO SOLO EN ZONAS BLANCAS      */
/* ============================================ */

.proyecto::after{
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #F5F5F5;
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    transition: opacity 0.5s ease;
    mix-blend-mode: hard-light;
    border-radius: 4px;
}

/* ============================================ */
/* ESCRITORIO - EFECTOS                        */
/* ============================================ */

@media (min-width: 769px) {
    
    .proyecto:hover::after{
        opacity: 1;
    }

    .proyecto:hover img{
        filter: contrast(1.2) brightness(1.1);
    }

    .proyecto:hover .titulo{
        color: #ffffff;
        letter-spacing: 2.5px;
    }
}

/* ============================================ */
/* MÓVIL - EFECTO TAP                          */
/* ============================================ */

@media (max-width: 768px) {
    
    .proyecto:active::after{
        opacity: 1;
        transition: opacity 0.15s ease;
    }

    .proyecto:active img{
        filter: contrast(1.2) brightness(1.1);
        transition: filter 0.15s ease;
    }

    .proyecto:active .titulo{
        color: #ffffff;
    }
}

/* ============================================ */
/* TÍTULOS                                     */
/* ============================================ */

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
    text-align: center;
    transition: all 0.4s ease;
    position:relative;
    z-index:3;
}

/* ============================================ */
/* MÓVIL - RESPONSIVE                          */
/* ============================================ */

@media (max-width: 768px) {

    .container{
        width:92%;
        margin:10px auto 30px;
    }

    .logo{
        max-width:100%;
        margin:0 auto 20px;
    }

    .proyectos{
        display:flex;
        flex-direction:column;
        gap:40px;
        align-items:center;
    }

    .columna-izquierda,
    .columna-derecha{
        display:flex;
        flex-direction:column;
        gap:40px;
        width:100%;
        max-width:100%;
        margin:0;
    }

    .columna-derecha{
        margin-top:0;
    }

    .proyecto{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
        overflow:hidden;
    }

    .proyecto img{
        width:90%;
        max-width:400px;
        display:block;
        filter: brightness(0.9) saturate(0.9);
    }

    .titulo{
        font-size:8px;
        letter-spacing:1.2px;
        margin-top:8px;
        text-align:center;
    }
}

</style>

</head>

<body>

<div class="container">

<a href="index.html" style="display:block; text-decoration:none;">
    <img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">
</a>

<div class="proyectos">

<div class="columna-izquierda">

    <a href="sucre.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="sucré.jpg" alt="Sucré">
            <div class="titulo">SUCRÉ</div>
        </div>
    </a>

    <a href="rabbits.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="madriguera.png" alt="SAVE THE F***ING RABBITS">
            <div class="titulo">SAVE THE F***ING RABBITS</div>
        </div>
    </a>

</div>

<div class="columna-derecha">

    <a href="hours.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="hours.png" alt="The Hours">
            <div class="titulo">THE HOURS</div>
        </div>
    </a>

    <a href="pisapapeles.html" target="_blank" style="text-decoration:none; display:block;">
        <div class="proyecto">
            <img src="pisapapeles.jpg" alt="Pisapapeles">
            <div class="titulo">PISAPAPELES</div>
        </div>
    </a>

</div>

</div>

</div>

</body>
</html>
