<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{

    flex-direction:column;
    align-items:center;
}

/* ============================================ */
/* LOGO CABECERA - DESPLEGABLE                 */
/* ============================================ */

.logo-wrapper{
    width:auto;
    max-width:900px;
    margin:60px auto 120px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
}

.logo-img{
    width:85%;
    max-width:850px;
    height:auto;
    display:block;
    transition: opacity 0.3s ease;
    cursor:pointer;
}

.logo-img:hover{
    opacity:0.7;
}

/* ============================================ */
/* PANEL DESPLEGABLE - SOLO ENLACE             */
/* ============================================ */

.info-panel{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: max-height 0.5s ease, opacity 0.5s ease, margin-top 0.5s ease, padding 0.5s ease;
    margin-top:0;
    padding:0 0;
    background:#000;
    width:100%;
    max-width:900px;
    pointer-events:none;
}

.logo-wrapper.active .info-panel{
    max-height:150px;
    opacity:1;
    margin-top:10px;
    padding:20px 0 25px;
    pointer-events:auto;
}

/* ENLACE "SOBRE EL PROYECTO" - SIN ESTIRAMIENTOS */
.info-panel .enlace-sobre{
    display:inline-block;
    color:#ffffff;
    text-decoration:none;
    font-weight:300;
    font-size:16px;
    letter-spacing:3px;
    text-transform:uppercase;
    transition: color 0.3s ease;
    padding:8px 20px;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:4px;
}

.info-panel .enlace-sobre:hover{
    color:#F4DE65;
    border-color:rgba(244,222,101,0.3);
}

/* ============================================ */
/* PROYECTOS                                    */
/* ============================================ */

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:80px;
    align-items:start;
    transition: margin-top 0.7s ease;
    width:100%;
    max-width:1900px;
}

.logo-wrapper.active .proyectos{
    margin-top:20px;
}

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:90px;
}

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:90px;
    margin-top:145px;
}

.proyecto{
    position:relative;
    cursor:pointer;
    border-radius:4px;
    width:100%;
}

.proyecto img{
    width:100%;
    display:block;
    transition: all 0.5s ease;
    position:relative;
    z-index:1;
}

.titulo{
    color:#F4DE65;
    font-size:11px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    margin-top:12px;
    text-align:center;
    transition: all 0.4s ease;
    position:relative;
    z-index:2;
}

/* ============================================ */
/* ESCRITORIO - HOVER PROYECTOS                */
/* ============================================ */

@media (min-width:769px){
    .proyecto:hover img{
        filter:brightness(1.25) saturate(1.4) sepia(0.5);
    }
    .proyecto:hover .titulo{
        color:#ffffff;
        letter-spacing:2.5px;
    }
}

/* ============================================ */
/* MÓVIL - TAP PROYECTOS                       */
/* ============================================ */

@media (max-width:768px){
    .proyecto:active img{
        filter:brightness(1.25) saturate(1.4) sepia(0.5);
        transition:filter 0.15s ease;
    }
    .proyecto:active .titulo{
        color:#ffffff;
    }
}

/* ============================================ */
/* FOOTER                                      */
/* ============================================ */

.footer{
    width:99.5%;
    max-width:1900px;
    margin:150px auto 30px;
    text-align:center;
}

.footer-logos{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:30px;
}

.footer-logos img{
    display:block;
    opacity:0.8;
    transition:opacity 0.3s ease;
}

.footer-logos img:hover{
    opacity:1;
}

/* ============================================ */
/* SOBRE EL PROYECTO - ENLACE EN FOOTER        */
/* ============================================ */

.sobre-proyecto-link{
    color:#F4DE65;
    font-size:10px;
    font-weight:300;
    letter-spacing:2.5px;
    text-transform:uppercase;
    text-decoration:none;
    transition: color 0.3s ease;
    display:inline-block;
    margin-bottom:25px;
    cursor:pointer;
}

.sobre-proyecto-link:hover{
    color:#ffffff;
}

/* ============================================ */
/* CONTACTO - DESPLEGABLE HACIA ABAJO          */
/* ============================================ */

.contacto-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    position:relative;
    margin-bottom:80px;
}

.contacto-text{
    color:#F4DE65;
    font-size:10px;
    font-weight:300;
    letter-spacing:2.5px;
    text-transform:uppercase;
    transition:color 0.3s ease;
    cursor:pointer;
    user-select:none;
    position:relative;
    z-index:2;
}

.contacto-text:hover{
    color:#ffffff;
}

/* PANEL DE CONTACTO - AHORA HACIA ABAJO */
.contacto-panel{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease, margin-top 0.3s ease, padding 0.3s ease;
    margin-top:0;
    padding:0 25px;
    background:#000;
    width:auto;
    min-width:280px;
    border:1px solid transparent;
    border-radius:8px;
    pointer-events:none;
    order:1;
}

.contacto-wrapper.active .contacto-panel,
.contacto-wrapper:hover .contacto-panel{
    max-height:300px;
    opacity:1;
    margin-top:15px;
    padding:20px 30px;
    border-color:#F4DE65;
    pointer-events:auto;
}

.contacto-panel p{
    color:#F4DE65;
    font-family:'Inter',sans-serif;
    font-weight:300;
    font-size:11px;
    line-height:2.2;
    letter-spacing:0.5px;
    margin:0;
    text-align:center;
}

.contacto-panel a{
    color:#F4DE65;
    text-decoration:none;
    transition:color 0.3s ease;
    font-family:'Inter',sans-serif;
    font-weight:300;
    display:inline-block;
    padding:2px 0;
}

.contacto-panel a:hover{
    color:#ffffff;
}

/* ============================================ */
/* INAEM - LOGO + TEXTO SIEMPRE VISIBLE        */
/* ============================================ */

.logo-inaem-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
}

.logo-inaem{
    height:55px;
    width:auto;
    transition: opacity 0.3s ease;
    display:block;
    opacity:0.8;
}

.logo-inaem:hover{

}

.compania-info{
    color:rgba(255,255,255,0.4);
    font-size:9px;

    letter-spacing:1.2px;
    text-transform:uppercase;
    line-height:1.8;
    margin-top:15px;
    display:block;
}

.compania-info span{
    display:block;
}

.footer-text{
    color:#F5E98D;
    font-size:10px;
    font-weight:300;
    letter-spacing:1.8px;
    text-transform:uppercase;
    display:inline-block;
    margin-top:15px;
}

/* ============================================ */
/* MÓVIL - RESPONSIVE                          */
/* ============================================ */

@media (max-width:768px){

    .container{
        width:92%;
        margin:10px auto 0;
    }

    .logo-wrapper{
        max-width:100%;
        margin:40px auto 60px;
        align-items:center;
    }

    .logo-img{
        width:80%;
        max-width:400px;
    }

    .proyectos{
        display:flex;
        flex-direction:column;
        gap:40px;
        align-items:center;
    }

    .columna-izquierda,
    .columna-derecha{
        display:flex;
        flex-direction:column;
        gap:40px;
        width:100%;
        max-width:100%;
        margin:0;
    }

    .columna-derecha{
        margin-top:0;
    }

    .proyecto{
        width:100%;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    .proyecto img{
        width:90%;
        max-width:400px;
        display:block;
        filter: brightness(0.9) saturate(0.9);
    }

    .titulo{
        font-size:8px;
        letter-spacing:1.2px;

    }

    .info-panel{

    }

    .logo-wrapper.active .info-panel{

    }

    .logo-wrapper.active .proyectos{

    }

    .info-panel .enlace-sobre{
        font-size:14px;
        letter-spacing:2.5px;

    }

    .footer{
        width:92%;

    }

    .sobre-proyecto-link{
        font-size:9px;

    }

    .contacto-wrapper{
        margin-bottom:60px;

    .contacto-text{

    }

    .contacto-wrapper.active .contacto-panel,
    .contacto-wrapper:hover .contacto-panel{
        padding:15px 20px;

    .contacto-panel p{

        margin-top:12px;
    }

        font-size:9px;
        letter-spacing:1.2px;
        margin-top:12px;
    }
}

</style>

<script>
document.addEventListener('DOMContentLoaded', function() {

    const logoWrapper = document.getElementById('logoWrapper');
    const logoImg = document.getElementById('logoImg');
    const contactoWrapper = document.getElementById('contactoWrapper');
    let closeTimeout = null;

    const isMobile = window.innerWidth <= 768;

    // ========================================== */
    // LOGO - HOVER SOLO SOBRE LA IMAGEN         */
    // ========================================== */

    if (!isMobile) {

        // Al pasar el ratón sobre la imagen del logo → abrir
        logoImg.addEventListener('mouseenter', function() {
            clearTimeout(closeTimeout);
            logoWrapper.classList.add('active');
        });

        // Al salir del logo-wrapper (incluye el texto desplegado) → cerrar con retardo
        logoWrapper.addEventListener('mouseleave', function(e) {
            // Si el ratón se mueve al panel de texto, no cerramos
            const related = e.relatedTarget;
            if (related && logoWrapper.contains(related)) {
                return;
            }
            closeTimeout = setTimeout(function() {
                logoWrapper.classList.remove('active');
            }, 400);
        });

        // Mantener abierto si el ratón está dentro del panel de texto
        const infoPanel = document.querySelector('.info-panel');
        if (infoPanel) {
            infoPanel.addEventListener('mouseenter', function() {
                clearTimeout(closeTimeout);
            });
            infoPanel.addEventListener('mouseleave', function() {
                closeTimeout = setTimeout(function() {
                    logoWrapper.classList.remove('active');
                }, 400);
            });
        }

    }

    // ========================================== */
    // MÓVIL - CLICK EN EL LOGO                 */
    // ========================================== */

    if (isMobile) {

        logoWrapper.addEventListener('click', function(e) {
            if (e.target.closest('a')) return;

            if (logoWrapper.classList.contains('active')) {
                window.location.href = 'index.html';
            } else {
                logoWrapper.classList.add('active');
            }
        });

        document.addEventListener('click', function(e) {
            if (logoWrapper.classList.contains('active') && !logoWrapper.contains(e.target)) {
                logoWrapper.classList.remove('active');
            }
            if (contactoWrapper.classList.contains('active') && !contactoWrapper.contains(e.target)) {
                contactoWrapper.classList.remove('active');
            }
        });

    }

    // ========================================== */
    // CONTACTO - HOVER / CLICK                  */
    // ========================================== */

    if (!isMobile) {

        contactoWrapper.addEventListener('mouseenter', function() {
            clearTimeout(closeTimeout);
            contactoWrapper.classList.add('active');
        });

        contactoWrapper.addEventListener('mouseleave', function(e) {
            const related = e.relatedTarget;
            if (!contactoWrapper.contains(related)) {
                closeTimeout = setTimeout(function() {
                    contactoWrapper.classList.remove('active');
                }, 250);
            }
        });

        const contactoPanel = contactoWrapper.querySelector('.contacto-panel');
        if (contactoPanel) {
            contactoPanel.addEventListener('mouseenter', function() {
                clearTimeout(closeTimeout);
            });
            contactoPanel.addEventListener('mouseleave', function() {
                closeTimeout = setTimeout(function() {
                    contactoWrapper.classList.remove('active');
                }, 250);
            });
        }

    }

    if (isMobile) {

        contactoWrapper.addEventListener('click', function(e) {
            if (e.target.closest('a')) return;
            contactoWrapper.classList.toggle('active');
        });

    }

    // ========================================== */
    // REDIMENSIONAR                             */
    // ========================================== */

    window.addEventListener('resize', function() {
        if (window.innerWidth > 768) {
            logoWrapper.classList.remove('active');
            contactoWrapper.classList.remove('active');
        }
    });

});
</script>
