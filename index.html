<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAVE THE F***ING RABBITS</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:99%;
    max-width:1800px;
    margin:20px auto 40px auto;
}

.logo{
    width:100%;
    max-width:900px;
    display:block;
    margin:0 auto 25px auto;
}

.proyectos{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:180px;
    align-items:start;
}

/* COLUMNA IZQUIERDA */

.columna-izquierda{
    display:flex;
    flex-direction:column;
    gap:85px;
}

/* COLUMNA DERECHA */

.columna-derecha{
    display:flex;
    flex-direction:column;
    gap:85px;
    margin-top:120px;
}

.proyecto img{
    width:100%;
    display:block;
}

/* Títulos */

.titulo{
    color:#F4DE65;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    font-weight:normal;
    margin-top:10px;
}

/* Los títulos miran hacia el centro */

.columna-izquierda .titulo{
    margin-left:90px;
}

.columna-derecha .titulo{
    margin-left:40px;
}

</style>

</head>

<body>

<div class="container">

<img class="logo" src="logo.png" alt="SAVE THE F***ING RABBITS">

<div class="proyectos">

<div class="columna-izquierda">

<div class="proyecto">
<img src="sucré.jpg" alt="Sucré">
<div class="titulo">

</div>

<div class="proyecto">

SAVE THE F***ING RABBITS
</div>
</div>

</div>

<div class="columna-derecha">

<div class="proyecto">
<img src="hours.png" alt="The Hours">
<div class="titulo">
THE HOURS
</div>
</div>

<div class="proyecto">
<img src="pisapapeles.jpg" alt="Pisapapeles">
<div class="titulo">
PISAPAPELES
</div>
</div>

</div>

</div>

</div>

</body>
</html>
